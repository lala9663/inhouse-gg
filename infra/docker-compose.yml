version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: inhouse-postgres
    restart: always
    environment:
      POSTGRES_USER: inhouse
      POSTGRES_PASSWORD: inhouse
      POSTGRES_DB: inhouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: inhouse-redis
    ports:
      - "6379:6379"

  backend:
    build: ../backend/api
    container_name: inhouse-backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend/api/app:/app
    depends_on:
      - postgres
      - redis

  frontend:
    build: ../frontend/web
    container_name: inhouse-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend/web:/app

  grafana:
    image: grafana/grafana
    container_name: inhouse-grafana
    ports:
      - "3001:3000"

volumes:
  postgres_data: